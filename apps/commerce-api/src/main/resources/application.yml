server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - logging.yml
      - monitoring.yml
  cloud:
    openfeign:
      okhttp:
        enabled: true
      httpclient:
        max-connections: 200
        max-connections-per-route: 30
        time-to-live: 900
      client:
        config:
          pg-client:
            connect-timeout: 1000
            read-timeout: 2000

pg:
  simulator:
    url: http://localhost:8082

resilience4j:
  circuitbreaker:
    circuit-breaker-aspect-order: 1
    instances:
      pg-request:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 60
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - java.io.IOException
          - com.loopers.infrastructure.payment.pg.PgServerException
        ignore-exceptions:
          - com.loopers.support.error.CoreException
      pg-query:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 60
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - java.io.IOException
          - com.loopers.infrastructure.payment.pg.PgServerException
        ignore-exceptions:
          - com.loopers.support.error.CoreException
  bulkhead:
    instances:
      pg-request:
        max-concurrent-calls: 20
  retry:
    retry-aspect-order: 2
    instances:
      pg-query:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exceptions:
          - java.io.IOException
          - com.loopers.infrastructure.payment.pg.PgServerException

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: local, test
  cloud:
    openfeign:
      client:
        config:
          pg-client:
            logger-level: FULL

logging:
  level:
    com.loopers.infrastructure.payment.pg.PgClient: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd
  cloud:
    openfeign:
      client:
        config:
          pg-client:
            logger-level: BASIC

logging:
  level:
    com.loopers.infrastructure.payment.pg.PgClient: DEBUG

springdoc:
  api-docs:
    enabled: false